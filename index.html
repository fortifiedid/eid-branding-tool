<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FortifiedID – Branding QR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f7;
      color: #1b434d;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
      letter-spacing: -0.01em;
    }

    p.subtitle {
      font-size: 0.9rem;
      color: #555;
      margin: 0 0 2rem;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
      color: #1b434d;
    }

    input[type="url"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid #d0dde0;
      border-radius: 10px;
      font-size: 1rem;
      color: #1b434d;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="url"]:focus { border-color: #2f7e8e; }

    .qr-wrap {
      display: flex;
      justify-content: center;
      margin: 1.75rem 0 1.25rem;
      min-height: 220px;
      align-items: center;
    }

    #qr canvas, #qr img { border-radius: 8px; }

    .placeholder {
      color: #aaa;
      font-size: 0.9rem;
      text-align: center;
    }

    .deeplink-box {
      background: #f0f6f7;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.78rem;
      word-break: break-all;
      color: #2f7e8e;
      cursor: pointer;
      user-select: all;
      position: relative;
    }

    .deeplink-box:hover { background: #e4f0f2; }

    .copy-hint {
      font-size: 0.72rem;
      color: #888;
      margin-top: 0.4rem;
      text-align: center;
    }

    .copied {
      font-size: 0.72rem;
      color: #2f7e8e;
      text-align: center;
      margin-top: 0.4rem;
      height: 1em;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<h1>FortifiedID Branding QR</h1>
<p class="subtitle">Generera en QR-kod för att konfigurera appens utseende</p>

<div class="card">
  <label for="baseurl">Backend-URL</label>
  <input
    type="url"
    id="baseurl"
    placeholder="https://service.example.com"
    autocomplete="off"
    spellcheck="false"
  />

  <div class="qr-wrap">
    <div id="qr"><span class="placeholder">Ange en URL för att generera QR</span></div>
  </div>

  <div id="deeplink-box" class="deeplink-box" style="display:none" title="Klicka för att kopiera"></div>
  <div class="copy-hint" id="copy-hint" style="display:none">Klicka på länken för att kopiera</div>
  <div class="copied" id="copied">&nbsp;</div>
</div>

<!-- qrcode.js — MIT licence, no dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
        integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4zsGAblvDuQYrsy0V1fRA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
(function () {
  const input    = document.getElementById('baseurl');
  const qrWrap   = document.getElementById('qr');
  const dlBox    = document.getElementById('deeplink-box');
  const hint     = document.getElementById('copy-hint');
  const copied   = document.getElementById('copied');
  let qrInstance = null;
  let hideTimer  = null;

  function buildDeepLink(raw) {
    const trimmed = raw.trim().replace(/\/+$/, '');
    if (!trimmed) return '';
    try { new URL(trimmed); } catch { return ''; }
    return 'idombud://branding?url=' + encodeURIComponent(trimmed);
  }

  function render(url) {
    // Clear previous
    qrWrap.innerHTML = '';
    qrInstance = null;

    if (!url) {
      qrWrap.innerHTML = '<span class="placeholder">Ange en URL för att generera QR</span>';
      dlBox.style.display = 'none';
      hint.style.display  = 'none';
      return;
    }

    try {
      qrInstance = new QRCode(qrWrap, {
        text:            url,
        width:           220,
        height:          220,
        colorDark:       '#1b434d',
        colorLight:      '#ffffff',
        correctLevel:    QRCode.CorrectLevel.M
      });
    } catch {
      qrWrap.innerHTML = '<span class="placeholder">Kunde inte generera QR</span>';
    }

    dlBox.textContent  = url;
    dlBox.style.display = '';
    hint.style.display  = '';
  }

  input.addEventListener('input', function () {
    render(buildDeepLink(this.value));
  });

  dlBox.addEventListener('click', function () {
    const text = dlBox.textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function () {
      copied.textContent = '✓ Kopierad!';
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function () { copied.textContent = '\u00a0'; }, 2000);
    });
  });
})();
</script>
</body>
</html>
